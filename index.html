<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solskjerming Befaring</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Solskjerming Befaring</h1>
<section class="card">
  <h2>Prosjekter</h2>

  <button onclick="nyttProsjekt()">+ Nytt prosjekt</button>

  <div id="prosjektListe"></div>
</section>
    <section class="card">
      <h2>Kundeinfo</h2>

      <input id="kundeNavn" placeholder="Kundenavn" />
      <input id="adresse" placeholder="Adresse" />
      <input id="poststed" placeholder="Postnr / sted" />
      <input id="telefon" placeholder="Telefon" />
      <input id="epost" placeholder="E-post" />
    </section>

    <section class="card">
      <h2>Legg til vindu</h2>

      <input id="plassering" placeholder="Plassering, f.eks. Stue venstre" />

      <select id="type">
        <option value="">Velg type</option>
        <option>Screen Zipner 80</option>
        <option>Screen Zipner 90</option>
        <option>Screen Zipner 110</option>
        <option>Screen Zipner 150</option>
        <option>Markise</option>
      </select>

      <input id="bredde" type="number" placeholder="Bredde i mm" />
      <input id="hoyde" type="number" placeholder="Høyde i mm" />

 <select id="kassefarge">
  <option value="">Velg kassefarge</option>
  <option>RAL 9005 MAT - STANDARD</option>
  <option>7016M - STANDARD</option>
  <option>7021M - STANDARD</option>
  <option>7039M - STANDARD</option>
  <option>8014M - STANDARD</option>
  <option>8019M - STANDARD</option>
  <option>9006M - STANDARD</option>
  <option>9010M - STANDARD</option>
  <option>9016M - STANDARD</option>
  <option>DB703S - STANDARD</option>
</select>

<select id="duk">
  <option value="">Velg duk</option>
  <option>Nerli Screen 5% 001001 grey/grey</option>
  <option>Nerli Screen 5% 001002 grey/white</option>
  <option>Nerli Screen 5% 001004 grey/gold</option>
  <option>Nerli Screen 5% 001010 grey/charcoal</option>
  <option>Nerli Screen 5% 001044 palm</option>
  <option>Nerli Screen 5% 001061 grey/white-pearl grey</option>
  <option>Nerli Screen 5% 002007 white/pearl-grey</option>
  <option>Nerli Screen 5% 007007 pearl grey/pearl grey</option>
  <option>Nerli Screen 5% 008003 Linen/sand</option>
  <option>Nerli Screen 5% 008008 linen/linen</option>
  <option>Nerli Screen 5% 008079 linen/grey-gold</option>
  <option>Nerli Screen 5% 010010 charcoal/charcoal</option>
  <option>Nerli Screen 5% 010011 charcoal/bronze</option>
  <option>Nerli Screen 5% 030030 pure black</option>
  <option>Nerli Screen 5% 032040 Mango</option>
  <option>Nerli Screen 5% 033001 oyster shell</option>
  <option>Nerli Screen 5% 033032 Soft Clay</option>
  <option>Nerli Screen 5% 033041 Maroon</option>
  <option>Nerli Screen 5% 033043 moss - CO - 270cm - NS</option>
</select>

<select id="brakett">
  <option value="">Velg brakettmål</option>
  <option>39 mm</option>
  <option>45 mm</option>
  <option>50 mm</option>
  <option>60 mm</option>
  <option>70 mm</option>
  <option>80 mm</option>
  <option>90 mm</option>
  <option>100 mm</option>
  <option>110 mm</option>
  <option>120 mm</option>
  <option>Spesial / annet</option>
</select>

<textarea id="kommentar" placeholder="Valgfri kommentar"></textarea>

      <button onclick="lagreVindu()">Lagre vindu</button>
      <button class="secondary" onclick="tomVinduSkjema()">Tøm vindusskjema</button>
    </section>

    <section class="card">
  <h2>Prosjektoversikt</h2>
  <div id="oversikt"></div>

  <button onclick="eksporterPDF()">Eksporter til PDF</button>
  <button class="danger" onclick="slettProsjekt()">Slett hele prosjektet</button>
</section>
  </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
